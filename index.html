<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 56rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-section h2,
        .tool-section h3 {
            margin: 0 0 var(--crusher-spacing-2);
            font-size: var(--crusher-font-size-xl);
            color: var(--crusher-text-primary);
        }
        .tool-section h3 {
            padding-bottom: var(--crusher-spacing-3);
            border-bottom: 1px solid var(--crusher-border-primary);
        }
        .tool-clock {
            text-align: center;
            display: grid;
            gap: var(--crusher-spacing-2);
            padding-block: var(--crusher-spacing-5);
        }
        .tool-clock-label {
            margin: 0;
            font-size: var(--crusher-font-size-lg);
            color: var(--crusher-text-primary);
        }
        .tool-clock-value {
            margin: 0;
            font-size: var(--crusher-font-size-3xl);
            font-weight: 700;
            color: var(--crusher-color-brand-primary);
        }
        .tool-clock-hint {
            margin: 0;
            font-size: var(--crusher-font-size-xs);
            color: var(--crusher-text-secondary);
        }
        .tool-label {
            display: block;
            margin-bottom: var(--crusher-spacing-1);
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-text-secondary);
        }
        .tool-grid {
            display: grid;
            gap: var(--crusher-spacing-6);
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
        }
        input.crusher-tool-control { padding: var(--crusher-spacing-2); }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Unix Timestamp Converter</h1>
            <p class="crusher-tool-lede">Convert between human-readable dates and Unix timestamps.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section tool-clock">
                <h2 class="tool-clock-label">Current Unix Timestamp (seconds)</h2>
                <p id="current-timestamp" class="tool-clock-value tool-mono">Loading...</p>
                <p class="tool-clock-hint">Updates every second</p>
            </section>

            <div class="tool-grid">
                <section class="crusher-tool-surface tool-section">
                    <h3>Human-Readable to Unix</h3>
                    <div>
                        <label for="date-input" class="tool-label">Date &amp; Time (Your Local)</label>
                        <input type="datetime-local" id="date-input" class="crusher-tool-control">
                    </div>
                    <div>
                        <label for="unix-output" class="tool-label">Resulting Timestamp</label>
                        <input type="text" id="unix-output" readonly class="crusher-tool-control tool-mono">
                    </div>
                </section>

                <section class="crusher-tool-surface tool-section">
                    <h3>Unix to Human-Readable</h3>
                    <div>
                        <label for="timestamp-input" class="tool-label">Timestamp (seconds)</label>
                        <input type="number" id="timestamp-input" class="crusher-tool-control tool-mono">
                    </div>
                    <div>
                        <label for="date-output" class="tool-label">Resulting Date (Your Local)</label>
                        <input type="text" id="date-output" readonly class="crusher-tool-control">
                    </div>
                </section>
            </div>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const currentTimestampEl = document.getElementById('current-timestamp');
        const dateInput = document.getElementById('date-input');
        const unixOutput = document.getElementById('unix-output');
        const timestampInput = document.getElementById('timestamp-input');
        const dateOutput = document.getElementById('date-output');

        function updateCurrentTimestamp() {
            const now = Math.floor(Date.now() / 1000);
            currentTimestampEl.textContent = now;
        }

        function humanToUnix() {
            if (dateInput.value) {
                const date = new Date(dateInput.value);
                const timestamp = Math.floor(date.getTime() / 1000);
                unixOutput.value = timestamp;
            } else {
                unixOutput.value = '';
            }
        }

        function unixToHuman() {
            const timestamp = timestampInput.value;
            if (timestamp && !isNaN(timestamp)) {
                const date = new Date(timestamp * 1000);
                const localDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
                const formattedString = localDate.toISOString().slice(0, 19);
                dateOutput.value = formattedString.replace('T', ' ');
            } else {
                dateOutput.value = '';
            }
        }

        function formatToDateTimeLocal(date) {
            const pad = (num) => num.toString().padStart(2, '0');
            const year = date.getFullYear();
            const month = pad(date.getMonth() + 1);
            const day = pad(date.getDate());
            const hours = pad(date.getHours());
            const minutes = pad(date.getMinutes());
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        function initialize() {
            updateCurrentTimestamp();
            setInterval(updateCurrentTimestamp, 1000);

            const now = new Date();
            const currentTimestampInSeconds = Math.floor(now.getTime() / 1000);

            dateInput.value = formatToDateTimeLocal(now);
            timestampInput.value = currentTimestampInSeconds;

            humanToUnix();
            unixToHuman();
        }

        dateInput.addEventListener('input', humanToUnix);
        timestampInput.addEventListener('input', unixToHuman);

        initialize();
    </script>
</body>
</html>
